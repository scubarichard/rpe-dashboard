<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"><style>:root{--bg:#0a0a0a;--surface:#111;--border:#2a2a2a;--accent:#e8ff4d;--accent2:#4dffb4;--text:#f0f0f0;--muted:#666;--danger:#ff4d4d;--warning:#ffaa4d}*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:"DM Sans",sans-serif}.nav{display:flex;gap:4px;padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border)}.nav a{padding:7px 14px;border-radius:6px;text-decoration:none;font-size:12px;font-weight:500;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}.nav a.active{color:var(--bg);background:var(--accent)}.dashboard{padding:20px 16px}.section-label{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);font-family:"DM Mono",monospace;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border)}.grid{display:grid;gap:10px;margin-bottom:16px}.grid-2{grid-template-columns:1fr 1fr}.grid-3{grid-template-columns:1fr 1fr 1fr}.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;position:relative;overflow:hidden}.card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:var(--border)}.card.accent::before{background:var(--accent)}.card.accent2::before{background:var(--accent2)}.card-label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-family:"DM Mono",monospace;margin-bottom:10px}.card-value{font-size:28px;font-weight:600;line-height:1;letter-spacing:-.02em}.cv-accent{color:var(--accent)}.cv-accent2{color:var(--accent2)}.card-sub{font-size:11px;color:var(--muted);margin-top:6px;font-family:"DM Mono",monospace}.stat-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}.stat-row:last-child{border-bottom:none}.stat-label{font-size:12px;color:var(--muted)}.stat-value{font-size:13px;font-weight:500;font-family:"DM Mono",monospace}.ok{color:var(--accent2)}.bad{color:var(--danger)}.warn{color:var(--warning)}.ts{font-size:10px;color:var(--muted);font-family:"DM Mono",monospace;padding:12px 0 4px}</style></head><body><nav class="nav"><a id="nav-ceo" href="?view=ceo">CEO</a><a id="nav-gm" href="?view=gm">GM</a><a id="nav-cfo" href="?view=cfo">CFO</a></nav><div id="content"></div><script>var view=new URLSearchParams(location.search).get("view")||"ceo";var el=document.getElementById("nav-"+view);if(el)el.className="active";var d={pipeline:"RPE_TOTAL_PIPELINE",netProfit:"RPE_TOTAL_NET_PROFIT",ev3x:"RPE_ENTERPRISE_3X",ev5x:"RPE_ENTERPRISE_5X",margin:"RPE_AVG_MARGIN",jobsOpen:"RPE_JOBS_OPEN",jobsWon:"RPE_JOBS_WON",laborBudget:"RPE_LABOR_BUDGET",laborCost:"RPE_LABOR_COST",laborVariance:"RPE_LABOR_VARIANCE",belowMargin:"RPE_JOBS_BELOW_MARGIN",stuckJobs:"RPE_STUCK_JOBS"};var h="";if(view==="gm"){h="<div class=dashboard><div class=section-label>The Machine - Production Status</div><div class='grid grid-2'><div class='card warning'><div class=card-label>Stuck Jobs</div><div class='card-value warn'>"+d.stuckJobs+"</div><div class=card-sub>Over 3 days</div></div><div class=card><div class=card-label>Jobs Open</div><div class=card-value>"+d.jobsOpen+"</div><div class=card-sub>Active pipeline</div></div></div><div class=card><div class=card-label>Pipeline Snapshot</div><div class=stat-row><span class=stat-label>Jobs Open</span><span class=stat-value>"+d.jobsOpen+"</span></div><div class=stat-row><span class=stat-label>Jobs Won</span><span class='stat-value ok'>"+d.jobsWon+"</span></div><div class=stat-row><span class=stat-label>Stuck 3+ Days</span><span class='stat-value warn'>"+d.stuckJobs+"</span></div><div class=stat-row><span class=stat-label>Below 40% Margin</span><span class='stat-value bad'>"+d.belowMargin+"</span></div></div><div class=ts>Updated daily at 6:10 AM ET</div></div>";}else if(view==="cfo"){h="<div class=dashboard><div class=section-label>The Math - Labor and Margin Control</div><div class='grid grid-2'><div class=card><div class=card-label>Total Labor Budget</div><div class=card-value>"+d.laborBudget+"</div><div class=card-sub>Committed across all jobs</div></div><div class=card><div class=card-label>Total Labor Cost</div><div class=card-value>"+d.laborCost+"</div><div class=card-sub>Crew payout to date</div></div></div><div class='grid grid-2'><div class='card accent2'><div class=card-label>Labor Variance</div><div class='card-value cv-accent2'>"+d.laborVariance+"</div><div class=card-sub>Budget minus cost</div></div><div class=card><div class=card-label>Avg Gross Margin</div><div class='card-value cv-accent2'>"+d.margin+"%</div><div class=card-sub>Target: 40%+</div></div></div><div class=card><div class=card-label>Margin Health</div><div class=stat-row><span class=stat-label>Jobs Below 40%</span><span class='stat-value bad'>"+d.belowMargin+"</span></div><div class=stat-row><span class=stat-label>Net Profit</span><span class='stat-value ok'>"+d.netProfit+"</span></div><div class=stat-row><span class=stat-label>Total Pipeline</span><span class=stat-value>"+d.pipeline+"</span></div></div><div class=ts>Updated daily at 6:10 AM ET</div></div>";}else{h="<div class=dashboard><div class=section-label>Sovereignty - Financial Overview</div><div class='grid grid-2'><div class='card accent'><div class=card-label>Total Pipeline Value</div><div class='card-value cv-accent'>"+d.pipeline+"</div><div class=card-sub>All active jobs</div></div><div class='card accent2'><div class=card-label>Net Profit</div><div class='card-value cv-accent2'>"+d.netProfit+"</div><div class=card-sub>After labor costs</div></div></div><div class='grid grid-2'><div class=card><div class=card-label>Enterprise Value 3x</div><div class=card-value>"+d.ev3x+"</div><div class=card-sub>Conservative multiple</div></div><div class=card><div class=card-label>Enterprise Value 5x</div><div class=card-value>"+d.ev5x+"</div><div class=card-sub>Growth multiple</div></div></div><div class='grid grid-3'><div class=card><div class=card-label>Avg Gross Margin</div><div class=card-value>"+d.margin+"%</div><div class=card-sub>Target: 40%+</div></div><div class=card><div class=card-label>Jobs Open</div><div class=card-value>"+d.jobsOpen+"</div><div class=card-sub>Active pipeline</div></div><div class=card><div class=card-label>Jobs Won</div><div class=card-value>"+d.jobsWon+"</div><div class=card-sub>Closed this year</div></div></div><div class=ts>Updated daily at 6:10 AM ET</div></div>";}document.getElementById("content").innerHTML=h;</script></body></html>
