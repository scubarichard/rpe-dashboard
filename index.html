<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"><style>:root{--bg:#0d0d0d;--surface:#141414;--surface2:#1c1c1c;--border:#252525;--gold:#C2A04A;--gold2:#d4b86a;--gold-dim:rgba(194,160,74,0.15);--text:#f0f0f0;--muted:#555;--danger:#e05252;--warning:#e09a3a;--ok:#4a9e7a}*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:"DM Sans",sans-serif;min-height:100vh}.nav{display:flex;align-items:center;gap:4px;padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border)}.nav-brand{display:flex;align-items:center;gap:8px;margin-right:20px}.nav-brand-name{font-size:13px;font-weight:700;color:var(--gold);letter-spacing:.08em;text-transform:uppercase}.nav-brand-sub{font-size:9px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;font-family:"DM Mono",monospace}.nav a{padding:6px 14px;border-radius:6px;text-decoration:none;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;transition:all .15s}.nav a:hover{color:var(--text)}.nav a.active{color:#0d0d0d;background:var(--gold)}.dashboard{padding:16px}.tier{margin-bottom:20px}.tier-label{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);font-family:"DM Mono",monospace;margin-bottom:10px;display:flex;align-items:center;gap:8px}.tier-label::after{content:"";flex:1;height:1px;background:var(--border)}.grid{display:grid;gap:8px;margin-bottom:0}.grid-2{grid-template-columns:1fr 1fr}.grid-3{grid-template-columns:1fr 1fr 1fr}.grid-4{grid-template-columns:1fr 1fr 1fr 1fr}.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;position:relative;overflow:hidden}.card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:var(--border)}.card.gold::before{background:var(--gold)}.card.ok::before{background:var(--ok)}.card.warn::before{background:var(--warning)}.card.danger::before{background:var(--danger)}.card-label{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-family:"DM Mono",monospace;margin-bottom:8px}.card-value{font-size:24px;font-weight:700;line-height:1;letter-spacing:-.02em}.card-value.gold{color:var(--gold)}.card-value.ok{color:var(--ok)}.card-value.warn{color:var(--warning)}.card-value.danger{color:var(--danger)}.card-sub{font-size:10px;color:var(--muted);margin-top:5px;font-family:"DM Mono",monospace}.gauge-wrap{margin-top:8px}.gauge-bar{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-top:4px}.gauge-fill{height:100%;border-radius:3px;transition:width .3s}.gauge-labels{display:flex;justify-content:space-between;font-size:9px;color:var(--muted);font-family:"DM Mono",monospace;margin-top:3px}.stat-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}.stat-row:last-child{border-bottom:none}.stat-label{font-size:11px;color:var(--muted)}.stat-value{font-size:12px;font-weight:600;font-family:"DM Mono",monospace}.red-flag{margin-top:6px}.red-flag-item{display:flex;justify-content:space-between;align-items:center;padding:6px 8px;background:var(--surface2);border-radius:4px;margin-bottom:4px;border-left:2px solid var(--danger)}.red-flag-name{font-size:11px;color:var(--text)}.red-flag-val{font-size:11px;font-weight:600;color:var(--danger);font-family:"DM Mono",monospace}.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}.badge.green{background:rgba(74,158,122,.12);color:var(--ok);border:1px solid rgba(74,158,122,.25)}.badge.red{background:rgba(224,82,82,.12);color:var(--danger);border:1px solid rgba(224,82,82,.25)}.badge.gold{background:var(--gold-dim);color:var(--gold);border:1px solid rgba(194,160,74,.3)}.ts{font-size:9px;color:var(--muted);font-family:"DM Mono",monospace;padding:10px 0 2px;text-align:right}</style></head><body><nav class="nav"><div class="nav-brand"><div><div class="nav-brand-name">RPE Systems</div><div class="nav-brand-sub">Operations Engine</div></div></div><a id="nav-ceo" href="?view=ceo">CEO</a><a id="nav-gm" href="?view=gm">GM</a><a id="nav-cfo" href="?view=cfo">CFO</a></nav><div id="content"></div><script>var view=new URLSearchParams(location.search).get("view")||"ceo";var el=document.getElementById("nav-"+view);if(el)el.className="active";var d={pipeline:"$154,500.00",netProfit:"$25,475.00",ev3x:"$76,425.00",ev5x:"$127,375.00",margin:40.1,jobsOpen:9,jobsWon:1,laborBudget:"$57,258.00",laborCost:"$37,855.00",laborVariance:"$19,403.00",belowMargin:2,stuckJobs:9};var laborPct=Math.round((37855/57258)*100);var marginOk=d.margin>=40;var h="";if(view==="gm"){h="<div class=dashboard><div class=tier><div class=tier-label>Tier 1 — Peace of Mind</div><div class='grid grid-2'><div class='card gold'><div class=card-label>Total Pipeline Value</div><div class='card-value gold'>"+d.pipeline+"</div><div class=card-sub>All active jobs combined</div></div><div class='card "+(d.stuckJobs>0?"warn":"ok")+"'><div class=card-label>Stuck Jobs (3+ Days)</div><div class='card-value "+(d.stuckJobs>0?"warn":"ok")+"'>"+d.stuckJobs+"</div><div class=card-sub>"+(d.stuckJobs>0?"Needs manager attention":"All jobs moving")+"</div></div></div></div><div class=tier><div class=tier-label>Tier 2 — 40/15 Health Monitor</div><div class='grid grid-2'><div class='card "+(marginOk?"ok":"danger")+"'><div class=card-label>Avg Gross Margin</div><div class='card-value "+(marginOk?"ok":"danger")+"'>"+d.margin+"%</div><div class=card-sub>Target: 40% minimum</div><div class=gauge-wrap><div class=gauge-bar><div class=gauge-fill style='width:"+Math.min(d.margin/60*100,100)+"%;background:"+(marginOk?"var(--ok)":"var(--danger)")'></div></div><div class=gauge-labels><span>0%</span><span style='color:"+(marginOk?"var(--ok)":"var(--danger)")+"'>40% target</span><span>60%</span></div></div></div><div class='card "+(laborPct<=15?"ok":"danger")+"'><div class=card-label>Labor Cap Tracker</div><div class='card-value "+(laborPct<=15?"ok":"danger")+"'>"+laborPct+"%</div><div class=card-sub>Target: 15% max of revenue</div><div class=gauge-wrap><div class=gauge-bar><div class=gauge-fill style='width:"+Math.min(laborPct/30*100,100)+"%;background:"+(laborPct<=15?"var(--ok)":"var(--danger)")'></div></div><div class=gauge-labels><span>0%</span><span style='color:"+(laborPct<=15?"var(--ok)":"var(--danger)")+"'>15% cap</span><span>30%</span></div></div></div></div></div><div class=tier><div class=tier-label>Tier 3 — Fulfillment Watchdog</div><div class='grid grid-2'><div class=card><div class=card-label>Job Status</div><div class=stat-row><span class=stat-label>Jobs Open (Pipeline)</span><span class=stat-value>"+d.jobsOpen+"</span></div><div class=stat-row><span class=stat-label>Jobs Won (Closed)</span><span class='stat-value' style='color:var(--ok)'>"+d.jobsWon+"</span></div><div class=stat-row><span class=stat-label>Below 40% Margin</span><span class='stat-value' style='color:"+(d.belowMargin>0?"var(--danger)":"var(--ok)")+"'>"+d.belowMargin+"</span></div></div><div class=card><div class=card-label>Red Flag Jobs (Below Margin)</div><div class='badge "+(d.belowMargin>0?"red":"green")+"' style='margin-bottom:8px'>"+(d.belowMargin>0?d.belowMargin+" jobs need review":"All jobs healthy")+"</div><div class=red-flag-item><span class=red-flag-name>See margin report</span><span class=red-flag-val>→ GHL</span></div></div></div></div><div class=ts>Updated daily at 6:10 AM ET</div></div>";}else if(view==="cfo"){h="<div class=dashboard><div class=tier><div class=tier-label>Tier 1 — Financial Pulse</div><div class='grid grid-2'><div class='card gold'><div class=card-label>Total Pipeline Value</div><div class='card-value gold'>"+d.pipeline+"</div><div class=card-sub>Active revenue potential</div></div><div class='card ok'><div class=card-label>Net Profit</div><div class='card-value ok'>"+d.netProfit+"</div><div class=card-sub>After all labor costs</div></div></div></div><div class=tier><div class=tier-label>Tier 2 — Labor & Margin Control</div><div class='grid grid-2'><div class=card><div class=card-label>Total Labor Budget</div><div class=card-value>"+d.laborBudget+"</div><div class=card-sub>Committed across all jobs</div></div><div class=card><div class=card-label>Total Labor Cost</div><div class=card-value>"+d.laborCost+"</div><div class=card-sub>Crew payout to date</div></div></div><div class='grid grid-2' style='margin-top:8px'><div class='card ok'><div class=card-label>Labor Variance</div><div class='card-value ok'>"+d.laborVariance+"</div><div class=card-sub>Budget minus cost</div></div><div class='card "+(marginOk?"ok":"danger")+"'><div class=card-label>Avg Gross Margin</div><div class='card-value "+(marginOk?"ok":"danger")+"'>"+d.margin+"%</div><div class=card-sub>Target: 40%+</div></div></div></div><div class=tier><div class=tier-label>Tier 3 — Enterprise Value</div><div class='grid grid-2'><div class=card><div class=card-label>Enterprise Value (3x)</div><div class=card-value>"+d.ev3x+"</div><div class=card-sub>Conservative multiple</div></div><div class=card><div class=card-label>Enterprise Value (5x)</div><div class=card-value>"+d.ev5x+"</div><div class=card-sub>Growth multiple</div></div></div></div><div class=ts>Updated daily at 6:10 AM ET</div></div>";}else{h="<div class=dashboard><div class=tier><div class=tier-label>Tier 1 — Peace of Mind</div><div class='grid grid-2'><div class='card gold'><div class=card-label>Total Pipeline Value</div><div class='card-value gold'>"+d.pipeline+"</div><div class=card-sub>All active jobs</div></div><div class='card ok'><div class=card-label>Net Profit</div><div class='card-value ok'>"+d.netProfit+"</div><div class=card-sub>After labor costs</
